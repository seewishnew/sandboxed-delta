name: "Delta Spark Python"
on:
  push:
    paths-ignore:
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.txt'
env:
  # SECURITY: Temporal lockdown — refuse any package version published after this date.
  # This date is a pre-attack baseline (before the active PyPI supply chain attack).
  UV_EXCLUDE_NEWER: "2026-03-10T00:00:00Z"
jobs:
  # Generate Spark versions matrix from CrossSparkVersions.scala
  # This workflow tests against released versions only (no snapshots)
  generate-matrix:
    name: "Generate Released Spark Versions Matrix"
    runs-on: ubuntu-24.04
    outputs:
      spark_versions: ${{ steps.generate.outputs.spark_versions }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: install java
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3.14.1
        with:
          distribution: "zulu"
          java-version: "17"
      - name: Generate released Spark versions matrix
        id: generate
        run: |
          # Get only released versions (exclude snapshots)
          SPARK_VERSIONS=$(python3 project/scripts/get_spark_version_info.py --released-spark-versions)
          echo "spark_versions=$SPARK_VERSIONS" >> $GITHUB_OUTPUT
          echo "Generated released Spark versions: $SPARK_VERSIONS"

  test:
    name: "DSP (${{ matrix.spark_version }})"
    runs-on: ubuntu-24.04
    needs: generate-matrix
    strategy:
      matrix:
        # Spark versions are dynamically generated - released versions only
        spark_version: ${{ fromJson(needs.generate-matrix.outputs.spark_versions) }}
        # These Scala versions must match those in the build.sbt
        scala: [2.13.16]
    env:
      SCALA_VERSION: ${{ matrix.scala }}
      SPARK_VERSION: ${{ matrix.spark_version }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Get Spark version details
        id: spark-details
        run: |
          # Get JVM version and full Spark version for this matrix entry
          JVM_VERSION=$(python3 project/scripts/get_spark_version_info.py --get-field "${{ matrix.spark_version }}" targetJvm | jq -r)
          FULL_VERSION=$(python3 project/scripts/get_spark_version_info.py --get-field "${{ matrix.spark_version }}" fullVersion | jq -r)
          echo "jvm_version=$JVM_VERSION" >> $GITHUB_OUTPUT
          echo "spark_full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "Using JVM $JVM_VERSION for Spark ${{ matrix.spark_version }} (full: $FULL_VERSION)"
      - name: install java
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3.14.1
        with:
          distribution: "zulu"
          java-version: ${{ steps.spark-details.outputs.jvm_version }}
      - name: Cache Scala, SBT
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3.5.0
        with:
          path: |
            ~/.sbt
            ~/.ivy2
            ~/.cache/coursier
          # Change the key if dependencies are changed. For each key, GitHub Actions will cache the
          # the above directories when we use the key for the first time. After that, each run will
          # just use the cache. The cache is immutable so we need to use a new key when trying to
          # cache new stuff.
          key: delta-sbt-cache-spark${{ matrix.spark_version }}-scala${{ matrix.scala }}
      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
      - name: Install Job dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make build-essential libssl-dev zlib1g-dev libbz2-dev libreadline-dev libsqlite3-dev wget curl llvm libncurses5-dev libncursesw5-dev xz-utils tk-dev libffi-dev liblzma-dev python3-openssl git
          sudo apt install libedit-dev
          curl -LO https://github.com/bufbuild/buf/releases/download/v1.28.1/buf-Linux-x86_64.tar.gz
          mkdir -p ~/buf
          tar -xvzf buf-Linux-x86_64.tar.gz -C ~/buf --strip-components 1
          rm buf-Linux-x86_64.tar.gz
          uv python install 3.10
          uv venv .venv --python 3.10
          # pip==24.0 required: pip >=24.1 rejects version strings containing '-'
          # (e.g. 3.3.0-SNAPSHOT from version.sbt)
          uv pip install --python .venv/bin/python pip==24.0 setuptools==69.5.1 wheel==0.43.0
          # Install pyspark matching the full spark version
          uv pip install --python .venv/bin/python pyspark==${{ steps.spark-details.outputs.spark_full_version }}
          uv pip install --python .venv/bin/python flake8==3.9.0
          uv pip install --python .venv/bin/python black==23.12.1
          uv pip install --python .venv/bin/python importlib_metadata==3.10.0
          uv pip install --python .venv/bin/python mypy==1.8.0
          uv pip install --python .venv/bin/python mypy-protobuf==3.3.0
          uv pip install --python .venv/bin/python cryptography==37.0.4
          uv pip install --python .venv/bin/python twine==4.0.1
          uv pip install --python .venv/bin/python wheel==0.33.4
          uv pip install --python .venv/bin/python setuptools==41.1.0
          uv pip install --python .venv/bin/python pydocstyle==3.0.0
          uv pip install --python .venv/bin/python pandas==2.2.0
          uv pip install --python .venv/bin/python pyarrow==15.0.0
          uv pip install --python .venv/bin/python pypandoc==1.3.3
          uv pip install --python .venv/bin/python numpy==1.22.4
          uv pip install --python .venv/bin/python googleapis-common-protos-stubs==2.2.0
          uv pip install --python .venv/bin/python grpc-stubs==1.24.11
          # Version-specific dependencies for Spark Connect compatibility
          if [[ "${{ matrix.spark_version }}" == "4.0" ]]; then
            uv pip install --python .venv/bin/python grpcio==1.67.0
            uv pip install --python .venv/bin/python grpcio-status==1.67.0
            uv pip install --python .venv/bin/python googleapis-common-protos==1.65.0
            uv pip install --python .venv/bin/python protobuf==5.29.1
          else
            # Spark 4.1+ requirements from https://github.com/apache/spark/blob/branch-4.1/dev/requirements.txt
            uv pip install --python .venv/bin/python grpcio==1.76.0
            uv pip install --python .venv/bin/python grpcio-status==1.76.0
            uv pip install --python .venv/bin/python googleapis-common-protos==1.71.0
            uv pip install --python .venv/bin/python protobuf==6.33.0
            uv pip install --python .venv/bin/python zstandard==0.25.0
          fi
      - name: Freeze installed dependencies
        run: |
          echo "=== uv pip freeze (Spark ${{ matrix.spark_version }}) ==="
          uv pip freeze --python .venv/bin/python
          echo "=== uv pip list (Spark ${{ matrix.spark_version }}) ==="
          uv pip list --python .venv/bin/python
      - name: Run Python tests
        # when changing TEST_PARALLELISM_COUNT make sure to also change it in spark_test.yaml
        run: |
          source .venv/bin/activate
          TEST_PARALLELISM_COUNT=4 python run-tests.py --group spark-python --spark-version ${{ matrix.spark_version }}
